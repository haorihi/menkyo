<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>普通２種免許 学科試験対策</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Zen Kaku Gothic New"', '"Inter"', 'sans-serif'],
          },
          colors: {
            sage: {
              100: '#f1f5f4',
              200: '#e1e8e5',
              300: '#c5d1cb',
            },
            ink: {
              DEFAULT: '#2c3539',
              muted: '#5a6b6d',
            },
            emerald: {
              soft: '#a2d5c6',
              text: '#2d7a5d'
            },
            coral: {
              soft: '#f0b8b4',
              text: '#b3473f'
            }
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.05)',
            'glass-hover': '0 12px 48px 0 rgba(31, 38, 135, 0.08)',
            'inner-white': 'inset 0 1px 0 rgba(255, 255, 255, 0.6), inset 0 -1px 0 rgba(255, 255, 255, 0.2)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 6s ease-in-out 3s infinite',
            'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'scale-in': 'scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            shake: {
              '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
            }
          }
        }
      }
    }
  </script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- GSAP for CardSwap animation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    body {
      color: #2c3539;
      background-color: #f1f5f4;
      background-image: linear-gradient(to bottom, #e1e8e5 0%, #f1f5f4 100%), url('data/assets/global_bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: "Zen Kaku Gothic New", sans-serif;
      overflow-x: hidden;
      margin: 0;
      min-height: 100vh;
    }

    /* Ambient Blobs for Glass Distortion */
    .ambient-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
      z-index: 0;
      animation: drift 15s infinite alternate ease-in-out;
      pointer-events: none;
    }
    .blob-1 { top: -10%; left: -20%; width: 300px; height: 300px; background: #ffffff; }
    .blob-2 { bottom: -10%; right: -10%; width: 250px; height: 250px; background: #cce0d8; animation-delay: -5s; }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.1); }
    }

    /* Glass Surface Utility */
    .glass-surface {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
    }

    /* Film-like Photo Treatment */
    .film-photo {
      filter: sepia(10%) contrast(110%) saturate(80%);
      border-radius: 24px;
      object-fit: cover;
    }

    /* Circular Progress (Result Screen) */
    .circular-chart {
      display: block;
      margin: 0 auto;
      max-width: 100%;
    }
    .circle-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.5);
      stroke-width: 2.5;
    }
    .circle {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      animation: progress 1.5s ease-out forwards;
    }
    @keyframes progress {
      0% { stroke-dasharray: 0, 100; }
    }

    /* Custom Transitions */
    .view-transition {
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="text-ink antialiased selection:bg-sage-200">
  <div id="root"></div>

  <!-- Ambient Background Layers -->
  <div class="ambient-blob blob-1"></div>
  <div class="ambient-blob blob-2"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- データ連携 ---
    const CHAPTER_NAMES = {
      1: '基本的な心構え',
      3: '運転に当たっての注意',
      5: '自動車の運転の方法',
      6: '道路の使用など',
      7: '高速道路での走行',
      8: '二輪車の運転の方法',
      9: '旅客自動車の運転者の心得（二種特有）',
      10: '交通事故・故障・災害',
      11: '所有者・管理者の心得',
      99: '道路標識・標示（集中対策）',
    };
    const CHAPTER_FILES = [1,3,5,6,7,8,9,10,11,99].map(ch => `data/ch${String(ch).padStart(2,'0')}.json`);

    // --- アイコン(Lucide風) ---
    const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3" /></svg>;
    const IconBookmark = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" /></svg>;
    const IconBookmarkSolid = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" /></svg>;
    const IconCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="9" /></svg>;
    const IconX = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>;
    const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>;
    const IconAlertTri = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const IconList = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;

    // --- CardSwap Components ---
    const Card = React.forwardRef(({ children, className = "", ...props }, ref) => (
      <div ref={ref} className={`swap-card ${className}`} {...props}>
        {children}
      </div>
    ));

    const CardSwap = ({ children, delay = 5000, cardDistance = 40, verticalDistance = 30 }) => {
      const containerRef = React.useRef(null);
      const childArr = React.Children.toArray(children);
      const refs = React.useMemo(() => childArr.map(() => React.createRef()), [childArr.length]);
      const order = React.useRef(Array.from({ length: childArr.length }, (_, i) => i));
      const tlRef = React.useRef(null);

      const makeSlot = (i, total) => ({
        x: i * cardDistance,
        y: -i * verticalDistance,
        z: -i * 100,
        opacity: 1 - (i * 0.25),
        zIndex: total - i
      });

      const placeNow = (el, slot) => {
        gsap.set(el, {
          x: slot.x, y: slot.y, z: slot.z,
          opacity: slot.opacity,
          zIndex: slot.zIndex,
          xPercent: -50, yPercent: -50,
          left: '50%', top: '50%'
        });
      };

      React.useEffect(() => {
        const total = refs.length;
        refs.forEach((r, i) => placeNow(r.current, makeSlot(i, total)));

        const swap = () => {
          if (order.current.length < 2) return;
          const [front, ...rest] = order.current;
          const elFront = refs[front].current;
          const tl = gsap.timeline();
          tlRef.current = tl;

          // Drop front card down
          tl.to(elFront, {
            y: '+=400', opacity: 0, scale: 0.9,
            duration: 0.8, ease: "power2.inIn"
          });

          // Move others forward
          tl.addLabel('promote', '-=0.4');
          rest.forEach((idx, i) => {
            const el = refs[idx].current;
            const slot = makeSlot(i, total);
            tl.to(el, {
              x: slot.x, y: slot.y, z: slot.z,
              opacity: slot.opacity,
              zIndex: slot.zIndex,
              duration: 0.7, ease: "back.out(1.2)"
            }, 'promote');
          });

          // Return front card to back
          const backSlot = makeSlot(total - 1, total);
          tl.set(elFront, { zIndex: backSlot.zIndex });
          tl.fromTo(elFront, 
            { y: '-=600', opacity: 0, scale: 0.8 },
            { 
              x: backSlot.x, y: backSlot.y, z: backSlot.z, 
              opacity: backSlot.opacity, scale: 1,
              duration: 0.8, ease: "power2.out" 
            }
          );

          tl.call(() => { order.current = [...rest, front]; });
        };

        const interval = setInterval(swap, delay);
        return () => clearInterval(interval);
      }, [refs, delay, cardDistance, verticalDistance]);

      return (
        <div ref={containerRef} className="card-swap-container">
          {childArr.map((child, i) => React.cloneElement(child, { ref: refs[i], key: i }))}
        </div>
      );
    };

    const MissionCard = React.forwardRef(({ title, desc, icon, colorClass, bgImage, onClick }, ref) => (
      <Card ref={ref} onClick={onClick} className="group">
        <div className="absolute inset-0 overflow-hidden">
          {bgImage ? (
            <div className="w-full h-full relative">
              <img src={bgImage} className="w-full h-full object-cover opacity-100 group-hover:scale-105 transition-transform duration-1000 ease-out" alt="" />
              <div className="absolute inset-0 bg-gradient-to-tr from-stone-100/10 to-transparent mix-blend-overlay"></div>
            </div>
          ) : (
            <div className={`w-full h-full opacity-10 bg-gradient-to-br ${colorClass} group-hover:scale-105 transition-transform duration-1000 ease-out`}></div>
          )}
          {/* Text readability gradient - focused more on the bottom-left */}
          <div className="absolute inset-0 bg-gradient-to-t from-white via-white/30 to-transparent"></div>
        </div>
        <div className="relative h-full p-8 flex flex-col justify-end z-10">
          <div className="absolute top-6 right-6 bg-white/60 backdrop-blur-md border border-white px-3 py-1 rounded-full shadow-sm">
            <span className="text-[10px] font-black uppercase tracking-widest text-stone-400">Mission</span>
          </div>
          <div className="text-left bg-white/20 backdrop-blur-[2px] p-4 rounded-3xl border border-white/30">
            <h3 className="text-2xl font-black tracking-tight text-stone-800 mb-2 drop-shadow-sm">{title}</h3>
            <p className="text-sm text-stone-600 font-medium leading-relaxed max-w-[90%]">{desc}</p>
          </div>
        </div>
      </Card>
    ));

    // --- メインアプリ ---
    function App() {
      const [currentView, setCurrentView] = useState('home'); 
      const [mode, setMode] = useState('random'); 
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [isCorrect, setIsCorrect] = useState(null);
      const [flagMenuOpen, setFlagMenuOpen] = useState(false);
      
      const [bookmarkedIds, setBookmarkedIds] = useState(() => {
        try {
          const saved = localStorage.getItem('bookmarkedIds');
          return saved ? new Set(JSON.parse(saved)) : new Set();
        } catch { return new Set(); }
      });

      const [answeredIds, setAnsweredIds] = useState(() => {
        try {
          const saved = localStorage.getItem('answeredIds');
          return saved ? new Set(JSON.parse(saved)) : new Set();
        } catch { return new Set(); }
      });

      const [flaggedIds, setFlaggedIds] = useState(() => {
        try {
          const saved = localStorage.getItem('flaggedIds');
          return saved ? new Set(JSON.parse(saved)) : new Set();
        } catch { return new Set(); }
      });

      const [flagNotes, setFlagNotes] = useState(() => {
        try {
          const saved = localStorage.getItem('flagNotes');
          return saved ? JSON.parse(saved) : {};
        } catch { return {}; }
      });

      const [syncToken, setSyncToken] = useState(() => {
        try {
          const params = new URLSearchParams(window.location.search);
          const token = params.get('token');
          if (token) {
            localStorage.setItem('syncToken', token);
            window.history.replaceState({}, document.title, window.location.pathname);
            return token;
          }
          return localStorage.getItem('syncToken') || null;
        } catch { return null; }
      });

      const pushBookmarks = async (idsArray) => {
        if (!syncToken) return;
        try {
          await fetch('/api/bookmarks', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${syncToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(idsArray)
          });
        } catch (e) {
          console.error('Failed to sync bookmarks to cloud', e);
        }
      };

      const pushFlags = async (idsArray) => {
        if (!syncToken) return;
        try {
          await fetch('/api/flags', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${syncToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(idsArray)
          });
        } catch (e) {
          console.error('Failed to sync flags to cloud', e);
        }
      };

      const [shuffledIndices, setShuffledIndices] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [loading, setLoading] = useState(true);
      const [fetchError, setFetchError] = useState(false);
      const [questionsData, setQuestionsData] = useState([]);
      const [selectedChapter, setSelectedChapter] = useState(null);

      useEffect(() => {
        Promise.all(CHAPTER_FILES.map(f => fetch(f).then(r => r.json())))
          .then(results => {
            setQuestionsData(results.flat());
            setLoading(false);
          })
          .catch(err => {
            console.error('Data load error:', err);
            setFetchError(true);
            setLoading(false);
          });
      }, []);

      useEffect(() => {
        if (!syncToken) return;
        fetch('/api/bookmarks', { headers: { 'Authorization': `Bearer ${syncToken}` } })
          .then(res => res.ok ? res.json() : null)
          .then(data => {
            if (data && Array.isArray(data)) {
              setBookmarkedIds(new Set(data));
              localStorage.setItem('bookmarkedIds', JSON.stringify(data));
            }
          }).catch(e => console.error('Cloud sync fetch failed', e));
        fetch('/api/flags', { headers: { 'Authorization': `Bearer ${syncToken}` } })
          .then(res => res.ok ? res.json() : null)
          .then(data => {
            if (data && Array.isArray(data)) {
              setFlaggedIds(new Set(data));
              localStorage.setItem('flaggedIds', JSON.stringify(data));
            }
          }).catch(e => console.error('Cloud flags sync failed', e));
      }, [syncToken]);

      const toggleBookmark = (id) => {
        setBookmarkedIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          const idsArray = [...next];
          localStorage.setItem('bookmarkedIds', JSON.stringify(idsArray));
          pushBookmarks(idsArray);
          return next;
        });
      };

      const toggleFlag = (id) => {
        setFlaggedIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          const idsArray = [...next];
          localStorage.setItem('flaggedIds', JSON.stringify(idsArray));
          pushFlags(idsArray);
          return next;
        });
      };

      const saveFlagNote = (id, note) => {
        setFlagNotes(prev => {
          const next = { ...prev, [id]: note };
          localStorage.setItem('flagNotes', JSON.stringify(next));
          return next;
        });
      };

      // Export flagged questions as JSON for AI review
      const exportFlagged = () => {
        const flaggedQuestions = questionsData
          .filter(q => flaggedIds.has(q.id))
          .map(q => ({
            id: q.id,
            chapter: q.chapter,
            question: q.question || q.text,
            answer: q.answer,
            explanation: q.explanation,
            trickPoint: q.trickPoint || null,
            reviewNote: flagNotes[q.id] || ''
          }));
        const json = JSON.stringify(flaggedQuestions, null, 2);
        navigator.clipboard.writeText(json).then(() => {
          alert(`${flaggedQuestions.length}問のデータをコピーしました！\nAIに貼り付けて精査を依頼できます。`);
        });
      };

      const startQuiz = (selectedMode, chapter) => {
        if (questionsData.length === 0) return;
        setMode(selectedMode);
        setSelectedChapter(chapter);
        let pool = [];
        if (selectedMode === 'bookmark') {
          pool = questionsData.filter(q => bookmarkedIds.has(q.id));
        } else if (chapter !== null) {
          pool = questionsData.filter(q => q.chapter === chapter);
        } else {
          pool = questionsData;
        }
        
        let targetIds = pool.map(q => q.id);
        const shuffled = [...targetIds].sort(() => Math.random() - 0.5);
        setShuffledIndices(shuffled);
        setCurrentIndex(0);
        setCurrentQuestion(questionsData.find(q => q.id === shuffled[0]));
        setCurrentView('quiz');
      };

      const handleNext = () => {
        let nextIndex = currentIndex + 1;
        let nextShuffled = shuffledIndices;

        if (nextIndex >= shuffledIndices.length) {
          nextShuffled = [...shuffledIndices].sort(() => Math.random() - 0.5);
          nextIndex = 0;
          setShuffledIndices(nextShuffled);
        }

        setCurrentIndex(nextIndex);
        setCurrentQuestion(questionsData.find(q => q.id === nextShuffled[nextIndex]));
        setCurrentView('quiz');
      };

      const handleAnswer = (userAnswer) => {
        const isCorrectAnswer = userAnswer === currentQuestion.answer;
        setIsCorrect(isCorrectAnswer);

        // 解答済みとして記録
        setAnsweredIds(prev => {
          const next = new Set(prev);
          next.add(currentQuestion.id);
          localStorage.setItem('answeredIds', JSON.stringify([...next]));
          return next;
        });

        if (!isCorrectAnswer) {
          setBookmarkedIds(prev => {
            const next = new Set(prev);
            next.add(currentQuestion.id);
            const idsArray = [...next];
            localStorage.setItem('bookmarkedIds', JSON.stringify(idsArray));
            pushBookmarks(idsArray);
            return next;
          });
        } else {
          // 正解したら苦手リストから外す
          setBookmarkedIds(prev => {
            if (!prev.has(currentQuestion.id)) return prev;
            const next = new Set(prev);
            next.delete(currentQuestion.id);
            const idsArray = [...next];
            localStorage.setItem('bookmarkedIds', JSON.stringify(idsArray));
            pushBookmarks(idsArray);
            return next;
          });
        }
        setCurrentView('result');
      };

      const renderSign = (filename) => {
        if (!filename) return null;
        return (
          <div className="bg-white/80 backdrop-blur-sm p-5 rounded-3xl border border-stone-200/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)] mb-8 mx-auto w-fit transform transition-all duration-500 hover:scale-[1.02]">
            <img src={`data/signs_new/${filename}`} alt="Road Sign" className="h-32 md:h-44 object-contain filter drop-shadow-md" />
          </div>
        );
      };

      return (
        <div className="min-h-screen relative z-10 flex flex-col font-sans no-scrollbar">
          <div className="w-full max-w-lg mx-auto flex-grow flex flex-col relative">

            {/* --- HOME VIEW --- */}
            {currentView === 'home' && (
              <main className="flex-grow flex flex-col px-6 pt-12 pb-24 animate-fade-in-up view-transition overflow-y-auto no-scrollbar">
                {/* Header */}
                <header className="flex justify-between items-center mb-10">
                  <div className="space-y-1">
                    <h2 className="text-[10px] font-bold text-ink-muted tracking-[0.2em] uppercase">GOOD DAY</h2>
                    <h1 className="text-2xl font-black text-ink leading-tight">DRIVER'S PREP</h1>
                  </div>
                  <div className="w-12 h-12 rounded-full glass-surface flex items-center justify-center p-0.5 shadow-inner-white border-2 border-white/50">
                    <div className="w-full h-full rounded-full bg-sage-200 flex items-center justify-center text-ink/40">
                      <i className="ph ph-user text-2xl"></i>
                    </div>
                  </div>
                </header>

                <div className="space-y-8">
                  {/* Main Progress Card */}
                  <div className="glass-surface rounded-[2.5rem] p-8 shadow-inner-white relative overflow-hidden group border border-white/80">
                    <div className="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 bg-white/30 rounded-full blur-2xl"></div>
                    <div className="flex justify-between items-start mb-6">
                      <div className="space-y-2">
                        <span className="inline-block px-3 py-1 bg-ink/5 rounded-full text-[10px] font-black text-ink-muted tracking-widest uppercase">普通第二種免許</span>
                        <h3 className="text-xl font-black text-ink leading-tight">現在の習得レベル</h3>
                      </div>
                      <div className="flex items-center space-x-2 text-emerald-text bg-emerald-soft/20 px-4 py-2 rounded-2xl border border-emerald-soft/30 backdrop-blur-sm">
                        <i className="ph ph-target text-lg"></i>
                        <span className="text-xs font-black">{questionsData.length > 0 ? Math.round(([...answeredIds].filter(id => !bookmarkedIds.has(id)).length / questionsData.length) * 100) : 0}%</span>
                      </div>
                    </div>
                    
                    <div className="space-y-3">
                      <div className="flex justify-between text-[11px] font-bold text-ink-muted tracking-widest uppercase">
                        <span>正解済み項目</span>
                        <span className="text-ink">{[...answeredIds].filter(id => !bookmarkedIds.has(id)).length} / {questionsData.length}</span>
                      </div>
                      <div className="h-3 w-full bg-black/5 rounded-full overflow-hidden p-0.5 border border-white/20">
                        <div 
                          className="h-full bg-ink rounded-full transition-all duration-1000 ease-out relative"
                          style={{ width: `${Math.max(0, ([...answeredIds].filter(id => !bookmarkedIds.has(id)).length / questionsData.length) * 100)}%` }}
                        >
                          <div className="absolute inset-0 bg-gradient-to-r from-transparent to-white/20"></div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Missions Section */}
                  <div className="space-y-5">
                    <div className="flex justify-between items-center px-2">
                      <h3 className="text-[11px] font-bold text-ink-muted tracking-[0.2em] uppercase">MISSION SELECT</h3>
                      <span className="text-[10px] font-bold text-emerald-text bg-emerald-soft/20 px-2 py-0.5 rounded-md border border-emerald-soft/30">ONLINE</span>
                    </div>
                    <div className="grid grid-cols-2 gap-5">
                      {/* Random 10 */}
                      <button 
                        onClick={() => startQuiz('random', null)}
                        className="col-span-2 glass-surface rounded-[2.5rem] p-6 shadow-inner-white text-left hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 group relative border border-white"
                      >
                        <div className="flex items-center justify-between">
                          <div className="flex items-center space-x-5">
                            <div className="w-14 h-14 rounded-2xl bg-white/60 flex items-center justify-center shadow-sm text-ink group-hover:bg-ink group-hover:text-white transition-all duration-500">
                              <i className="ph ph-shuffle text-2xl"></i>
                            </div>
                            <div>
                              <h4 className="text-lg font-black text-ink">ランダム10問</h4>
                              <p className="text-[11px] text-ink-muted font-bold tracking-wide">全範囲からクイック出題</p>
                            </div>
                          </div>
                          <i className="ph ph-caret-right text-ink/20 text-xl group-hover:translate-x-1 transition-transform"></i>
                        </div>
                      </button>

                      {/* Sign Master */}
                      <button 
                        onClick={() => startQuiz('random', 99)}
                        className="glass-surface rounded-[2.5rem] p-6 shadow-inner-white text-left hover:scale-[1.05] active:scale-[0.95] transition-all duration-300 flex flex-col gap-4 border border-white/80"
                      >
                        <div className="w-12 h-12 rounded-2xl bg-white/60 flex items-center justify-center shadow-sm text-ink">
                          <i className="ph ph-traffic-sign text-xl"></i>
                        </div>
                        <div>
                          <h4 className="text-sm font-black text-ink leading-tight">標識特訓</h4>
                          <p className="text-[10px] text-ink-muted font-bold">視覚的な引掛け対策</p>
                        </div>
                      </button>

                      {/* Weakness */}
                      <button 
                        onClick={() => bookmarkedIds.size > 0 && startQuiz('bookmark', null)}
                        disabled={bookmarkedIds.size === 0}
                        className={`glass-surface rounded-[2.5rem] p-6 shadow-inner-white text-left hover:scale-[1.05] active:scale-[0.95] transition-all duration-300 flex flex-col gap-4 border border-white/80 ${bookmarkedIds.size === 0 ? 'opacity-40 grayscale pointer-events-none' : ''}`}
                      >
                        <div className="w-12 h-12 rounded-2xl bg-white/60 flex items-center justify-center shadow-sm text-coral-text">
                          <i className="ph ph-shield-warning text-xl"></i>
                        </div>
                        <div>
                          <h4 className="text-sm font-black text-ink leading-tight">苦手克服</h4>
                          <p className="text-[10px] text-ink-muted font-bold">{bookmarkedIds.size}問を復習中</p>
                        </div>
                      </button>

                      {/* Flagged Review */}
                      <button 
                        onClick={() => setCurrentView('flag-list')}
                        className="col-span-2 glass-surface rounded-[2.5rem] p-5 shadow-inner-white text-left hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 group border border-amber-200/50 bg-amber-50/30"
                      >
                        <div className="flex items-center justify-between">
                          <div className="flex items-center space-x-4">
                            <div className="w-12 h-12 rounded-2xl bg-amber-100/60 flex items-center justify-center shadow-sm text-amber-600 group-hover:bg-amber-500 group-hover:text-white transition-all duration-500">
                              <i className="ph ph-flag text-xl"></i>
                            </div>
                            <div>
                              <h4 className="text-sm font-black text-ink">要確認リスト</h4>
                              <p className="text-[10px] text-ink-muted font-bold">
                                {flaggedIds.size > 0 ? `${flaggedIds.size}問にフラグ中 · AI精査対応` : 'フラグした問題はここへ'}
                              </p>
                            </div>
                          </div>
                          {flaggedIds.size > 0 && (
                            <span className="text-xs font-black text-amber-600 bg-amber-100 px-3 py-1 rounded-full border border-amber-200">{flaggedIds.size}</span>
                          )}
                        </div>
                      </button>
                    </div>
                  </div>

                  {/* Chapter List (Simplified Footer) */}
                  <div className="glass-surface rounded-[2.5rem] p-6 border border-white/30">
                    <details className="group">
                      <summary className="list-none cursor-pointer flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <i className="ph ph-list-bullets text-ink/40"></i>
                          <span className="text-sm font-black text-ink/60 tracking-wider">分野別に学習する</span>
                        </div>
                        <i className="ph ph-caret-down text-ink/20 transition-transform group-open:rotate-180"></i>
                      </summary>
                      <div className="mt-4 grid grid-cols-1 gap-2 pt-4 border-t border-white/20">
                        {[1,3,5,6,7,8,9,10,11].map(ch => (
                          <button
                            key={ch}
                            onClick={() => startQuiz('random', ch)}
                            className="w-full text-left p-4 rounded-2xl hover:bg-white/40 transition-colors text-xs font-bold text-ink-muted flex justify-between items-center"
                          >
                            <span>Chapter {ch}: {CHAPTER_NAMES[ch]}</span>
                            <i className="ph ph-arrow-right opacity-40"></i>
                          </button>
                        ))}
                      </div>
                    </details>
                  </div>
                </div>
              </main>
            )}

            {/* --- QUIZ VIEW --- */}
            {currentView === 'quiz' && currentQuestion && (
              <main className="flex-grow flex flex-col pt-12 pb-8 px-6 animate-scale-in view-transition">
                {/* Header */}
                <header className="flex items-center justify-between mb-10 z-10 relative">
                  <button onClick={() => setCurrentView('home')} aria-label="ホームに戻る" className="w-12 h-12 rounded-full glass-surface flex items-center justify-center text-ink hover:bg-white transition-colors border-2 border-white/50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink">
                    <i className="ph ph-house text-xl"></i>
                  </button>
                  <div className="text-center">
                    <span className="text-[10px] font-black text-ink-muted tracking-[0.2em] block mb-1 uppercase">EXERCISING</span>
                    <div className="text-sm font-black text-ink tracking-widest"><span className="text-2xl">{currentIndex + 1}</span> / {shuffledIndices.length}</div>
                  </div>
                  <div className="flex items-center gap-2">
                    {flaggedIds.has(currentQuestion.id) && (
                      <span className="text-[9px] font-black text-amber-600 bg-amber-100 px-2 py-0.5 rounded-full border border-amber-200 tracking-wider">要確認</span>
                    )}
                    <button 
                      onClick={() => toggleBookmark(currentQuestion.id)}
                      aria-label={bookmarkedIds.has(currentQuestion.id) ? '苦手リストから削除' : '苦手リストに追加'}
                      aria-pressed={bookmarkedIds.has(currentQuestion.id)}
                      className={`w-12 h-12 rounded-full glass-surface flex items-center justify-center transition-all border-2 border-white/50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink ${bookmarkedIds.has(currentQuestion.id) ? 'bg-coral-soft text-white border-coral-soft' : 'text-ink hover:bg-white'}`}
                    >
                      <i className={`ph ph-bookmark-simple text-xl ${bookmarkedIds.has(currentQuestion.id) ? 'ph-fill' : ''}`}></i>
                    </button>
                  </div>
                </header>

                <div className="absolute top-0 left-0 w-full h-1.5 bg-black/5 z-20">
                  <div 
                    className="h-full bg-ink transition-all duration-500 ease-out"
                    style={{ width: `${((currentIndex + 1) / shuffledIndices.length) * 100}%` }}
                  ></div>
                </div>

                <div className="flex-1 flex flex-col gap-6 z-10 relative">
                  {/* Question Card */}
                  <div className="glass-surface rounded-[2.5rem] p-8 shadow-inner-white border border-white relative min-h-[40%] flex flex-col justify-center">
                    <div className="absolute top-4 left-6">
                      <span className="text-[9px] font-black text-ink/20 tracking-[0.3em] uppercase">Examination</span>
                    </div>
                    
                    {currentQuestion.signImage && (
                      <div className="bg-white/50 backdrop-blur-md p-6 rounded-3xl border border-white/40 shadow-sm mx-auto mb-8 max-w-[180px]">
                        <img src={`data/signs_new/${currentQuestion.signImage}`} className="w-full h-auto object-contain filter drop-shadow-md" alt="Traffic Sign" />
                      </div>
                    )}

                    <p className="text-xl font-black text-ink leading-loose tracking-wide text-center">
                      {currentQuestion.question || currentQuestion.text}
                    </p>
                  </div>

                  <div className="flex-1"></div>

                  {/* Large O / X Buttons */}
                  <div className="flex gap-5 h-40 mb-6">
                    <button 
                      onClick={() => handleAnswer(true)}
                      className="flex-1 glass-surface rounded-[3rem] shadow-glass flex flex-col items-center justify-center gap-3 active:scale-95 transition-all duration-300 border-2 border-white/80 group hover:bg-emerald-soft/10"
                    >
                      <i className="ph ph-circle text-6xl text-emerald-text/60 group-hover:text-emerald-text transition-all"></i>
                      <span className="text-xs font-black text-emerald-text tracking-[.2em]">正しい</span>
                    </button>
                    <button 
                      onClick={() => handleAnswer(false)}
                      className="flex-1 glass-surface rounded-[3rem] shadow-glass flex flex-col items-center justify-center gap-3 active:scale-95 transition-all duration-300 border-2 border-white/80 group hover:bg-coral-soft/10"
                    >
                      <i className="ph ph-x text-6xl text-coral-text/60 group-hover:text-coral-text transition-all"></i>
                      <span className="text-xs font-black text-coral-text tracking-[.2em]">誤り</span>
                    </button>
                  </div>
                </div>
              </main>
            )}

            {/* --- RESULT VIEW --- */}
            {currentView === 'result' && currentQuestion && (
              <main className="flex-grow flex flex-col pt-16 pb-12 px-6 overflow-y-auto no-scrollbar view-transition animate-scale-in">
                <div className="text-center mb-10">
                  <h2 className="text-ink font-black text-3xl tracking-[.1em] mb-3 leading-tight">{isCorrect ? 'GOOD JOB!' : 'TRY AGAIN'}</h2>
                  <p className="text-[10px] text-ink-muted font-bold tracking-[.3em] uppercase">{isCorrect ? 'Excellent logic' : 'A small mistake to learn from'}</p>
                </div>

                {/* Score Indicator */}
                <div className="flex justify-center mb-10">
                  <div className={`w-32 h-32 rounded-[2.5rem] glass-surface border-4 flex items-center justify-center shadow-inner-white ${isCorrect ? 'text-emerald-text border-emerald-soft/50' : 'text-coral-text border-coral-soft/50'}`}>
                    <i className={`ph ${isCorrect ? 'ph-check-circle' : 'ph-x-circle'} text-6xl`}></i>
                  </div>
                </div>

                {/* Explanation Card */}
                <div className="glass-surface rounded-[3rem] p-10 shadow-inner-white border border-white space-y-8 mb-8">
                  <div className="flex justify-between items-center border-b border-black/5 pb-6">
                    <span className="text-[10px] font-black text-ink-muted tracking-widest uppercase">ANSWERS</span>
                    <span className={`text-xl font-black flex items-center gap-2 ${currentQuestion.answer ? 'text-emerald-text' : 'text-coral-text'}`}>
                      <i className={`ph ${currentQuestion.answer ? 'ph-circle' : 'ph-x'} font-bold`}></i>
                      {currentQuestion.answer ? '正しい' : '誤り'}
                    </span>
                  </div>

                  <div className="space-y-4">
                    <span className="text-[10px] font-black text-ink-muted tracking-widest uppercase">EXPLANATION</span>
                    <p className="text-lg font-bold text-ink leading-[1.8] tracking-wide">
                      {currentQuestion.explanation}
                    </p>
                  </div>

                  {/* Trick Point */}
                  {(currentQuestion.trickPoint || currentQuestion.trickType) && (
                    <div className="bg-sage-100/50 border border-white p-6 rounded-[2rem] flex items-start gap-4">
                      <div className="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-ink/30 shadow-sm border border-stone-200/20">
                        <i className="ph ph-lightbulb"></i>
                      </div>
                      <div className="space-y-2">
                        <h4 className="text-[10px] font-black text-ink-muted tracking-widest uppercase">Analysis</h4>
                        <p className="text-xs font-bold text-ink/60 leading-relaxed">
                          {currentQuestion.trickPoint || (currentQuestion.trickType === 'absolute_expression' ? '「絶対」「必ず」「すべて」などの絶対的表現に注意！' : '引っ掛けが含まれています。条件や例外を正確に確認しましょう。')}
                        </p>
                      </div>
                    </div>
                  )}
                </div>

                {/* Flag Button */}
                <button
                  onClick={() => toggleFlag(currentQuestion.id)}
                  className={`w-full py-4 rounded-[2rem] font-black text-xs tracking-[.15em] transition-all flex items-center justify-center gap-2 border-2 ${
                    flaggedIds.has(currentQuestion.id)
                      ? 'bg-amber-100 text-amber-700 border-amber-300 hover:bg-amber-200'
                      : 'bg-white/30 text-ink/50 border-white/60 hover:border-amber-300 hover:text-amber-600 hover:bg-amber-50'
                  }`}
                >
                  <i className={`ph ph-flag text-base ${flaggedIds.has(currentQuestion.id) ? 'ph-fill' : ''}`}></i>
                  {flaggedIds.has(currentQuestion.id) ? '要確認マーク済み（タップで解除）' : 'この問題に要確認フラグを立てる'}
                </button>

                <div className="space-y-4">
                  <button
                    onClick={handleNext}
                    className="w-full bg-ink text-white py-6 rounded-full font-black text-sm tracking-[.2em] shadow-xl hover:bg-black transition-all hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3 uppercase"
                  >
                    CONTINUE NEXT
                    <i className="ph ph-arrow-right"></i>
                  </button>

                  <button
                    onClick={() => setCurrentView('home')}
                    className="w-full text-ink font-bold py-6 text-xs tracking-widest bg-white/20 hover:bg-white/40 rounded-full transition-all uppercase"
                  >
                    BACK TO HOME
                  </button>
                </div>
              </main>
            )}

            {/* --- FLAG LIST VIEW --- */}
            {currentView === 'flag-list' && (
              <main className="flex-grow flex flex-col pt-12 pb-12 px-6 overflow-y-auto no-scrollbar animate-fade-in-up view-transition">
                {/* Header */}
                <header className="flex items-center justify-between mb-8">
                  <button onClick={() => setCurrentView('home')} aria-label="ホームに戻る" className="w-12 h-12 rounded-full glass-surface flex items-center justify-center text-ink hover:bg-white transition-colors border-2 border-white/50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink">
                    <i className="ph ph-house text-xl"></i>
                  </button>
                  <div className="text-center">
                    <span className="text-[10px] font-black text-ink-muted tracking-[0.2em] block mb-1 uppercase">Review Queue</span>
                    <div className="text-sm font-black text-ink tracking-widest"><span className="text-2xl">{flaggedIds.size}</span> 問</div>
                  </div>
                  <button
                    onClick={exportFlagged}
                    disabled={flaggedIds.size === 0}
                    className="w-12 h-12 rounded-full glass-surface flex items-center justify-center text-amber-600 hover:bg-amber-100 transition-colors border-2 border-amber-200/50 disabled:opacity-30 disabled:pointer-events-none focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ink"
                    title="AIレビュー用JSONをコピー"
                    aria-label="AIレビュー用JSONをコピー"
                  >
                    <i className="ph ph-export text-xl"></i>
                  </button>
                </header>

                {flaggedIds.size === 0 ? (
                  <div className="flex-1 flex flex-col items-center justify-center gap-4 text-center">
                    <div className="w-20 h-20 rounded-[2rem] glass-surface flex items-center justify-center text-amber-400 border border-amber-200/50">
                      <i className="ph ph-flag text-4xl"></i>
                    </div>
                    <div>
                      <p className="font-black text-ink/50 text-sm tracking-wide">フラグされた問題はありません</p>
                      <p className="text-[11px] text-ink/30 font-bold mt-1">解答後の画面でフラグを立てられます</p>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {/* AI Export Banner */}
                    <div className="glass-surface rounded-[2rem] p-5 border border-amber-200/40 bg-amber-50/20 flex items-start gap-3">
                      <div className="w-9 h-9 rounded-xl bg-amber-100 flex items-center justify-center text-amber-600 shrink-0 mt-0.5">
                        <i className="ph ph-robot text-lg"></i>
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-[11px] font-black text-amber-700 tracking-wider mb-1">AI精査エクスポート</p>
                        <p className="text-[10px] text-ink/50 font-bold leading-relaxed">右上のボタンでフラグ問題をJSONコピー。ClaudeやGeminiに貼り付けて法令チェックを依頼できます。</p>
                      </div>
                    </div>

                    {/* Flagged Question List */}
                    {questionsData
                      .filter(q => flaggedIds.has(q.id))
                      .map(q => (
                        <details key={q.id} className="glass-surface rounded-[2rem] border border-white group">
                          <summary className="list-none cursor-pointer p-5 flex items-start gap-3">
                            <div className="w-8 h-8 rounded-xl bg-amber-100 flex items-center justify-center text-amber-600 shrink-0 mt-0.5">
                              <i className="ph ph-flag-pennant ph-fill text-sm"></i>
                            </div>
                            <div className="flex-1 min-w-0">
                              <p className="text-[10px] font-black text-ink-muted tracking-widest uppercase mb-1">Ch{q.chapter} · {q.id}</p>
                              <p className="text-sm font-bold text-ink leading-snug line-clamp-2 group-open:line-clamp-none">{q.question || q.text}</p>
                            </div>
                            <i className="ph ph-caret-down text-ink/20 shrink-0 mt-1 transition-transform group-open:rotate-180"></i>
                          </summary>
                          <div className="px-5 pb-5 space-y-3">
                            <div className="pt-3 border-t border-black/5 space-y-3">
                              <div className="flex items-center gap-2">
                                <span className="text-[9px] font-black text-ink-muted tracking-widest uppercase">正解</span>
                                <span className={`text-sm font-black flex items-center gap-1 ${q.answer ? 'text-emerald-text' : 'text-coral-text'}`}>
                                  <i className={`ph ${q.answer ? 'ph-circle' : 'ph-x'} font-bold`}></i>
                                  {q.answer ? '正しい' : '誤り'}
                                </span>
                              </div>
                              <p className="text-xs font-bold text-ink/70 leading-relaxed">{q.explanation}</p>
                              {q.trickPoint && (
                                <p className="text-[10px] font-bold text-amber-700 bg-amber-50 rounded-2xl px-3 py-2 border border-amber-100 leading-relaxed">
                                  💡 {q.trickPoint}
                                </p>
                              )}
                              {/* Memo field */}
                              <textarea
                                placeholder="精査メモ（任意）..."
                                defaultValue={flagNotes[q.id] || ''}
                                onBlur={e => saveFlagNote(q.id, e.target.value)}
                                className="w-full text-xs font-bold text-ink/60 bg-white/60 border border-white/60 rounded-2xl px-3 py-2 resize-none outline-none focus:border-amber-300 transition-colors placeholder:text-ink/20"
                                rows={2}
                              />
                              <button
                                onClick={() => toggleFlag(q.id)}
                                className="w-full text-[10px] font-black text-coral-text tracking-wider py-2 rounded-2xl hover:bg-coral-soft/20 transition-colors border border-coral-soft/30"
                              >
                                フラグを解除する
                              </button>
                            </div>
                          </div>
                        </details>
                      ))
                    }
                  </div>
                )}
              </main>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
